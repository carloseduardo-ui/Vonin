<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Semanal de Caixa — VONIN + CHOCOLAB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap');

/* ── TOKENS BASE — VONIN BRAND OFICIAL ── */
:root {
  /* Cores VONIN oficiais */
  --vonin-ruby:    #76232F;  /* Antique Ruby */
  --vonin-burg:    #A6192E;  /* Vivid Burgundy */
  --vonin-dkgrey:  #53565A;  /* Davy's Grey */
  --vonin-mdgrey:  #A7A8AA;  /* Dark Medium Gray */
  --vonin-ltgrey:  #D0D0CE;  /* Light Gray */

  /* Superfícies */
  --bg:      #F4F4F4;
  --white:   #FFFFFF;
  --s2:      #EBEBEB;
  --s3:      #E0E0DE;
  --border:  rgba(83,86,90,0.12);
  --border2: rgba(83,86,90,0.22);

  /* Texto */
  --text:    #1A1A1A;
  --muted:   var(--vonin-dkgrey);
  --muted2:  #3A3A3A;

  /* Semânticos */
  --green:   #1A6B3C;
  --gd:      rgba(26,107,60,0.10);
  --amber:   #92400E;
  --ad:      rgba(146,64,14,0.10);
  --red-err: #A6192E;
  --erd:     rgba(166,25,46,0.10);

  /* VONIN — usa Vivid Burgundy como cor principal */
  --v:       #A6192E;
  --v2:      #76232F;
  --vd:      rgba(166,25,46,0.10);

  /* CHOCOLAB */
  --c:       #3B2B16;
  --c2:      #5C4122;
  --cd:      rgba(59,43,22,0.10);
  --c-gold:  #A0722A;
  --c-cream: #F7F0E6;
}

* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'Lato',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:13px;
  line-height:1.5;
  min-height:100vh;
}

/* ── LOGIN ── */
.login-overlay {
  position:fixed; inset:0; z-index:9999;
  background:var(--white);
  display:flex; align-items:center; justify-content:center;
}
.login-box {
  width:100%; max-width:340px;
  padding:44px 36px;
  display:flex; flex-direction:column; align-items:center; gap:18px;
  border:1px solid var(--border2);
  border-radius:16px;
  box-shadow:0 12px 48px rgba(0,0,0,0.08);
  background:var(--white);
}
.login-wordmark {
  font-family:'Lato',sans-serif;
  font-size:32px; font-weight:900;
  letter-spacing:0.10em; text-transform:uppercase;
  color:var(--v);
}
.login-subtitle { font-size:12px; color:var(--muted); text-align:center; }
.login-input {
  width:100%; padding:11px 14px;
  border:1.5px solid var(--border2); border-radius:8px;
  font-size:14px; font-family:'Lato',sans-serif;
  outline:none; text-align:center; letter-spacing:0.12em;
  transition:border-color .15s;
}
.login-input:focus { border-color:var(--v); }
.login-btn {
  width:100%; padding:11px;
  background:var(--v); color:#fff;
  border:none; border-radius:8px;
  font-size:13px; font-weight:700;
  cursor:pointer; font-family:'Lato',sans-serif;
  transition:background .15s;
}
.login-btn:hover { background:var(--v2); }
.login-err {
  font-size:11px; color:var(--red-err);
  background:var(--erd); border-radius:6px;
  padding:7px 12px; width:100%; text-align:center;
  display:none;
}
.login-err.show { display:block; }

/* ── HEADER ── */
.header {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  height:54px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px;
  box-shadow:0 1px 0 var(--border);
}
.h-left { display:flex; align-items:center; gap:16px; }
.wordmark {
  font-family:'Lato',sans-serif;
  font-size:18px; font-weight:900;
  letter-spacing:0.10em; text-transform:uppercase;
}
.wm-vonin { color:var(--v); }
.wm-sep { color:var(--s3); margin:0 2px; }
.wm-choco { color:var(--c-gold); }
.h-title { font-size:12px; font-weight:400; color:var(--muted); letter-spacing:0.01em; }
.h-right { display:flex; align-items:center; gap:10px; }
.corte-tag {
  font-family:'DM Mono',monospace; font-size:10px;
  color:var(--muted); background:var(--s2);
  border:1px solid var(--border2);
  border-radius:5px; padding:3px 9px;
}
.upd-tag { font-size:10px; color:var(--muted); }
.btn-upd {
  display:flex; align-items:center; gap:5px;
  background:var(--v); color:#fff;
  border:none; border-radius:7px;
  padding:6px 13px; font-size:11px; font-weight:700;
  cursor:pointer; transition:background .15s;
  font-family:'Lato',sans-serif;
  letter-spacing:0.02em;
}
.btn-upd:hover { background:var(--v2); }
.btn-upd:disabled { opacity:.4; cursor:not-allowed; }
@keyframes spin { to { transform:rotate(360deg); } }
.spin { display:inline-block; animation:spin .7s linear infinite; }

/* ── BLOCOS MÊS (entradas/saídas agrupadas) ── */
.mes-bloco-hd{display:flex;justify-content:space-between;align-items:center;padding:8px 0 4px;border-bottom:1.5px solid var(--border2);margin-top:8px;margin-bottom:2px;}
.mes-bloco-nome{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;}
.mes-bloco-tot{font-size:12px;font-weight:600;}

/* ── TABS ── */
.tabs {
  background:var(--white);
  border-bottom:1px solid var(--border);
  display:flex; padding:0 28px;
}
.tab {
  padding:0 20px; height:44px;
  display:flex; align-items:center; gap:7px;
  font-size:12px; font-weight:500; color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s, border-color .15s;
  white-space:nowrap;
}
.tab:hover { color:var(--text); }
.tab.active { color:var(--text); border-bottom-color:var(--text); }
.tab.tv.active { color:var(--v); border-bottom-color:var(--v); }
.tab.tc.active { color:var(--c-gold); border-bottom-color:var(--c-gold); }
.pip { width:6px; height:6px; border-radius:50%; }
.pg { background:var(--green); }
.pv { background:var(--v); }
.pc { background:var(--c-gold); }

/* ── VIEWS ── */
.view { display:none; padding:28px; max-width:1400px; margin:0 auto; }
.view.on { display:block; }

/* CHOCOLAB VIEW — fundo levemente creme */
#view-chocolab { background:var(--c-cream); border-radius:0; }

/* ── LOADING ── */
.loading-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; gap:14px;
}
.loading-spinner {
  width:32px; height:32px;
  border:2px solid var(--s3); border-top-color:var(--v);
  border-radius:50%; animation:spin .7s linear infinite;
}
.loading-text { font-size:13px; font-weight:500; color:var(--muted2); }
.loading-steps { display:flex; flex-direction:column; gap:5px; }
.loading-step { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:7px; }
.loading-step.done { color:var(--green); }
.loading-step.active { color:var(--v); font-weight:600; }
.err-box {
  background:var(--erd); border:1px solid rgba(185,29,47,.15);
  border-radius:10px; padding:20px 24px; margin:28px;
  color:var(--red-err); font-size:12px; line-height:1.9;
}

/* ── RESUMO EXECUTIVO ── */
.exec {
  border-radius:10px;
  border:1px solid var(--border2);
  border-left:3px solid var(--v);
  background:var(--white);
  padding:16px 20px;
  margin-bottom:20px;
}
.exec-ttl {
  font-size:9px; font-weight:800; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--v);
  margin-bottom:10px;
}
.exec-line {
  font-size:12px; color:var(--muted2);
  display:flex; align-items:flex-start; gap:8px;
  padding:3px 0;
}

/* ── SEMÁFOROS ── */
.sems { display:grid; gap:10px; margin-bottom:20px; }
.s3 { grid-template-columns:1fr 1fr 1fr; }
.s1 { grid-template-columns:1fr; }

.sem {
  border-radius:10px; border:1px solid var(--border);
  background:var(--white);
  padding:18px 22px;
  display:flex; align-items:center; justify-content:space-between;
  position:relative; overflow:hidden;
}
.sem::after {
  content:'';
  position:absolute; top:0; left:0; width:3px; height:100%;
  border-radius:10px 0 0 10px;
}
.sv::after { background:var(--v); }
.sc::after { background:var(--c-gold); }
.sg::after { background:var(--green); }

.sem-left { display:flex; flex-direction:column; gap:3px; padding-left:4px; }
.sem-eye {
  font-size:9px; font-weight:800; letter-spacing:0.12em;
  text-transform:uppercase;
}
.ev { color:var(--v); }
.ec { color:var(--c-gold); }
.eg { color:var(--muted); }
.sem-st { font-size:13px; font-weight:700; }
.s-green { color:var(--green); }
.s-yellow { color:var(--amber); }
.s-red { color:var(--red-err); }
.sem-desc { font-size:10px; color:var(--muted); }
.sem-right { text-align:right; }
.sem-num {
  font-family:'DM Mono',monospace;
  font-size:24px; font-weight:500; line-height:1;
}
.nv { color:var(--v); }
.nc { color:var(--c-gold); }
.ng { color:var(--green); }
.ny { color:var(--amber); }
.nr { color:var(--red-err); }
.nm { color:var(--muted); }
.sem-lbl { font-size:9px; color:var(--muted); margin-top:3px; }

/* ── KPIs ── */
.kpis { display:grid; gap:10px; margin-bottom:10px; }
.k4 { grid-template-columns:repeat(4,1fr); }
.k3 { grid-template-columns:repeat(3,1fr); }
.k2 { grid-template-columns:repeat(2,1fr); }
.kpi {
  background:var(--white); border:1px solid var(--border);
  border-radius:10px; padding:14px 16px;
}
.kpi-l {
  font-size:9px; font-weight:700; letter-spacing:0.09em;
  text-transform:uppercase; color:var(--muted);
  margin-bottom:7px;
}
.kpi-v { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; }
.kpi-s { font-size:10px; color:var(--muted); margin-top:4px; }
.kv { color:var(--v); } .kc { color:var(--c-gold); }
.kg { color:var(--green); } .ky { color:var(--amber); }
.kr { color:var(--red-err); } .kt { color:var(--text); }

/* ── SECTION LABEL ── */
.sec {
  font-size:9px; font-weight:800; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--muted);
  margin:22px 0 10px;
  display:flex; align-items:center; gap:10px;
}
.sec::after { content:''; flex:1; height:1px; background:var(--border2); }
.sec-n {
  background:var(--v); color:#fff;
  width:16px; height:16px; border-radius:4px;
  display:inline-flex; align-items:center; justify-content:center;
  font-size:8px; font-weight:900; flex-shrink:0;
}
/* CHOCOLAB: accent dourado */
#view-chocolab .sec-n { background:var(--c-gold); }
#view-chocolab .exec { border-left-color:var(--c-gold); }
#view-chocolab .exec-ttl { color:var(--c-gold); }

/* ── BLOCKS ── */
.bg { display:grid; gap:10px; }
.bg2 { grid-template-columns:1fr 1fr; }
.bg1 { grid-template-columns:1fr; }
.block {
  background:var(--white); border:1px solid var(--border);
  border-radius:10px; padding:16px 20px;
}
/* CHOCOLAB blocks — toque de creme */
#view-chocolab .block { background:#FDFAF4; border-color:rgba(59,43,22,0.10); }

.block-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:12px; margin-bottom:12px;
  border-bottom:1px solid var(--border);
}
.block-ttl {
  font-size:9px; font-weight:700; letter-spacing:0.09em;
  text-transform:uppercase; color:var(--muted2);
}
.badge { font-size:10px; font-weight:600; border-radius:5px; padding:2px 8px; }
.b-g { background:var(--gd);  color:var(--green); }
.b-n { background:var(--s2);  color:var(--muted); }
.b-y { background:var(--ad);  color:var(--amber); }
.b-r { background:var(--erd); color:var(--red-err); }
.b-v { background:var(--vd);  color:var(--v); }
.b-c { background:var(--cd);  color:var(--c-gold); }

/* ── DATA ROWS ── */
.dr {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid var(--border);
}
.dr:last-child { border-bottom:none; padding-bottom:0; }
.dl { font-size:12px; color:var(--muted2); }
.dv { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; }
.dp { color:var(--green); } .dn { color:var(--red-err); }
.dw { color:var(--amber); } .dm { color:var(--muted); }
.dv_ { color:var(--v); } .dc_ { color:var(--c-gold); }
.dbig { font-size:15px; }
.dr.bold .dl { font-weight:600; color:var(--text); font-size:13px; }
.dr.bold .dv { font-size:14px; }

/* ── CHART ── */
.chart-wrap { position:relative; height:200px; width:100%; }
.chart-wrap.tall { height:260px; }

/* ── PROJ TABLE ── */
.proj-wrap { overflow-x:auto; margin-top:14px; }
.pt { width:100%; border-collapse:collapse; font-family:'DM Mono',monospace; font-size:11px; }
.pt th {
  padding:5px 10px; text-align:right;
  font-size:9px; font-weight:700; letter-spacing:0.07em;
  text-transform:uppercase; color:var(--muted);
  border-bottom:1px solid var(--border2);
}
.pt th:first-child { text-align:left; font-family:'Lato',sans-serif; }
.pt td {
  padding:7px 10px; text-align:right;
  border-bottom:1px solid var(--border); font-weight:500;
}
.pt td:first-child {
  text-align:left; color:var(--muted2);
  font-family:'Lato',sans-serif; font-size:12px; font-weight:400;
}
.pt tr.sr td { background:var(--s2); font-size:12px; font-weight:700; }
.pt tr:last-child td { border-bottom:none; }
.wk { font-size:9px; color:var(--muted); display:block; font-family:'Lato',sans-serif; font-weight:400; margin-bottom:2px; }

/* ── PCT BAR ── */
.pct-row { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-bottom:5px; }
.pct-tr { height:4px; background:var(--s2); border-radius:2px; overflow:hidden; margin-bottom:12px; }
.pct-fi { height:4px; border-radius:2px; }
.pfl { background:var(--green); } .pfm { background:var(--amber); } .pfh { background:var(--red-err); }

/* ── CLIENT TABLE ── */
.ct { width:100%; border-collapse:collapse; font-size:12px; }
.ct th {
  text-align:left; font-size:9px; font-weight:700;
  letter-spacing:0.09em; text-transform:uppercase;
  color:var(--muted); padding:0 0 7px;
  border-bottom:1px solid var(--border2);
}
.ct th:last-child { text-align:right; }
.ct td { padding:6px 0; border-bottom:1px solid var(--border); vertical-align:middle; }
.ct td:last-child { text-align:right; font-family:'DM Mono',monospace; font-weight:500; }
.ct tr:last-child td { border-bottom:none; }
.cb {
  display:inline-block; border-radius:3px;
  font-size:9px; font-weight:700; padding:1px 5px; margin-left:4px;
}
.cbr { background:var(--erd); color:var(--red-err); }
.cbo { background:var(--ad);  color:var(--amber); }
.cbg { background:var(--gd);  color:var(--green); }
.cbm { background:var(--s2);  color:var(--muted); }

/* ── COMPARE TABLE ── */
.cmp { width:100%; border-collapse:collapse; font-size:12px; }
.cmp th {
  padding:7px 14px; font-size:9px; font-weight:700;
  letter-spacing:0.09em; text-transform:uppercase;
  color:var(--muted); border-bottom:1px solid var(--border2); text-align:right;
}
.cmp th:first-child { text-align:left; }
.cmp td {
  padding:9px 14px; border-bottom:1px solid var(--border);
  text-align:right; font-family:'DM Mono',monospace; font-weight:500;
}
.cmp td:first-child { text-align:left; font-family:'Lato',sans-serif; color:var(--muted2); }
.cmp tr:last-child td { border-bottom:none; }
.cmp tr.sub td { background:var(--s2); font-weight:700; }

.alert {
  background:var(--ad); border:1px solid rgba(146,64,14,.18);
  border-radius:7px; padding:9px 13px;
  font-size:11px; color:var(--amber);
  margin-top:10px; display:flex; gap:7px;
}

footer {
  text-align:center; padding:22px 28px;
  font-size:10px; color:var(--muted);
  border-top:1px solid var(--border);
  margin-top:10px;
  display:flex; align-items:center; justify-content:center; gap:18px;
}
.footer-v {
  font-family:'Lato',sans-serif;
  font-size:15px; font-weight:800;
  letter-spacing:0.06em; color:var(--v);
}
.footer-c { color:var(--c-gold); font-weight:600; }

@media(max-width:900px) {
  .s3,.bg2,.k4 { grid-template-columns:1fr; }
  .k3 { grid-template-columns:1fr 1fr; }
  .view,.header,.tabs { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-wordmark">VONIN</div>
    <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:-8px">Grupo VONIN · Report Semanal de Caixa</p>
    <input class="login-input" type="password" id="login-input"
      placeholder="senha" maxlength="30"
      onkeydown="if(event.key==='Enter')checkLogin()" autofocus>
    <div class="login-err" id="login-err">Senha incorreta.</div>
    <button class="login-btn" onclick="checkLogin()">Entrar</button>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="h-left">
    <span class="wordmark"><span class="wm-vonin">VONIN</span><span class="wm-sep"> · </span><span class="wm-choco">CHOCOLAB</span></span>
    <span class="h-title">Report Semanal de Caixa</span>
  </div>
  <div class="h-right">
    <span class="corte-tag" id="badge-corte">—</span>
    <span class="upd-tag" id="last-upd"></span>
    <button class="btn-upd" id="btn-upd" onclick="loadData()">
      <span id="icon-r">↻</span> Atualizar
    </button>
  </div>
</header>

<nav class="tabs">
  <div class="tab active" onclick="switchTab('consolidado',this)"><span class="pip pg"></span>Consolidado</div>
  <div class="tab tv"     onclick="switchTab('vonin',this)"><span class="pip pv"></span>VONIN</div>
  <div class="tab tc"     onclick="switchTab('chocolab',this)"><span class="pip pc"></span>CHOCOLAB</div>
</nav>

<div id="app">
  <div class="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Aguardando autenticação…</div>
  </div>
</div>

<footer>
  <span class="footer-v">VONIN</span>
  <span>·</span>
  <span class="footer-c">CHOCOLAB</span>
  <span>· Report Semanal de Caixa · voninmaquinas.com.br</span>
</footer>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const API_URL    = 'https://script.google.com/macros/s/AKfycbxj0apR0ApxBlqCF3las0msgPHwj3-5CWgmBuj1G1AWsUMN2PcT9gUry1qAiGtxXKxwPQ/exec';
const HASH_OK    = '9ec5aaeef0279c340b0f82b0d601e34de536eb4ce101aa98f115f6d120f96023'; // vonin2026
const AUTO_MS    = 5 * 60 * 1000;

// ── AUTH ────────────────────────────────────────────────────
async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function checkLogin() {
  const v = document.getElementById('login-input').value;
  const h = await sha256(v);
  if (h === HASH_OK) {
    sessionStorage.setItem('va', h);
    document.getElementById('login-overlay').style.display = 'none';
    loadData();
  } else {
    const e = document.getElementById('login-err');
    e.classList.add('show');
    document.getElementById('login-input').value='';
    document.getElementById('login-input').focus();
    setTimeout(()=>e.classList.remove('show'),3000);
  }
}
function initAuth() {
  if (sessionStorage.getItem('va') === HASH_OK) {
    document.getElementById('login-overlay').style.display='none';
    loadData();
  } else {
    setTimeout(()=>document.getElementById('login-input')?.focus(),100);
  }
}

// ── HELPERS ─────────────────────────────────────────────────
const fmt = v => {
  const n = Number(v);
  if (isNaN(n)) return '—';
  const a = Math.abs(n);
  if (a >= 1000000) return 'R$'+(n/1000000).toFixed(2).replace('.',',')+'M';
  return 'R$ '+Math.round(n).toLocaleString('pt-BR');
};
const fmtPct = v => isNaN(v)||v===null?'—':(v*100).toFixed(1).replace('.',',')+'%';
const sign   = v => v>0?'+':'';
const cls    = v => v>0?'dp':v<0?'dn':'dm';
const toNum  = v => {
  if (v===null||v===undefined||v==='') return 0;
  if (typeof v==='number') return v;
  return parseFloat(String(v).replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.'))||0;
};
const toDate = v => {
  if (!v) return null;
  if (v instanceof Date) return isNaN(v.getTime())?null:v;
  const s = String(v).trim();
  let m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m) return new Date(+m[3],+m[2]-1,+m[1]);
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) { const a=+m[1],b=+m[2],y=+m[3]; if(a>12)return new Date(y,b-1,a); if(b>12)return new Date(y,a-1,b); return new Date(y,a-1,b); }
  const d=new Date(v); return isNaN(d.getTime())?null:d;
};
const scls = (v,m) => v>=m?'s-green':v>=m*.9?'s-yellow':'s-red';
const slbl = (v,m) => v>=m?'● Verde':v>=m*.9?'● Amarelo':'● Vermelho';
const diasAtraso = dt => !dt?0:Math.max(0,Math.floor((new Date()-dt)/(864e5)));
const badgeDias = dias => dias>30?`<span class="cb cbr">${dias}d</span>`:dias>15?`<span class="cb cbo">${dias}d</span>`:`<span class="cb cbg">${dias}d</span>`;

// ── PARSE ───────────────────────────────────────────────────
function parseParams(rows) {
  let corte='',minV=150000,minC=100000,resp='',leitura='';
  for (const r of rows) {
    const k=String(r[1]||'').trim(), v=r[2];
    if(k==='Data de corte') corte=v;
    if(k.includes('mínimo VONIN')) minV=toNum(v)||150000;
    if(k.includes('mínimo CHOCOLAB')) minC=toNum(v)||100000;
    if(k==='Responsável pelo report') resp=v;
    if(k==='Responsável pela leitura') leitura=v;
  }
  return {corte,minV,minC,resp,leitura};
}

function parseEmpresa(rows, corteDate) {
  const find = kw => rows.find(r=>r.some(c=>String(c||'').toLowerCase().includes(kw.toLowerCase())));
  const gv   = (kw,col=2) => { const r=find(kw); return r?toNum(r[col]):0; };

  const caixa=gv('Disponível caixa'), invest=gv('Investimentos');
  const credLim=gv('Crédito — limite'), credUso=gv('Crédito — usado');
  const cxAnt=gv('semana anterior');
  const pagarme=gv('Pagar.me');
  // consol = apenas caixa disponível, SEM investimentos
  const consol=caixa, credDisp=credLim-credUso, variacao=consol-cxAnt;
  const recebido=gv('Recebido'), pago=gv('Pago'), resultado=recebido-pago;

  const iHdr=rows.findIndex(r=>r.some(c=>String(c||'').trim()==='Cliente'));
  const recvRows=[];
  if(iHdr>=0) {
    for(let i=iHdr+1;i<rows.length;i++) {
      const r=rows[i];
      const cli=String(r[1]||'').trim();
      if(!cli||cli.toUpperCase().includes('TOTAL')) break;
      const val=toNum(r[2]),dt=toDate(r[3]),st=String(r[4]||'').trim(),venc=toNum(r[5]);
      const tipo=String(r[6]||'').trim();
      if(val>0) recvRows.push({cliente:cli,valor:val,dt,status:st,vencido:venc,tipo});
    }
  }
  const abertos=recvRows.filter(r=>r.status==='Em aberto');
  const totalAberto=abertos.reduce((s,r)=>s+r.valor,0);
  const totalVencido=recvRows.reduce((s,r)=>s+r.vencido,0);
  const pctVencido=totalAberto>0?totalVencido/totalAberto:0;
  const top5=recvRows.filter(r=>r.vencido>0).sort((a,b)=>b.vencido-a.vencido).slice(0,5);
  const adiantRows=recvRows.filter(r=>r.tipo==='Adiantamento');
  const totalAdiant=adiantRows.reduce((s,r)=>s+r.valor,0);

  const base=corteDate||new Date();
  const SEMS=Array.from({length:6},(_,i)=>{
    const ini=new Date(base); ini.setDate(ini.getDate()+i*7+1);
    const fim=new Date(ini); fim.setDate(ini.getDate()+6);
    return {ini,fim,lbl:ini.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})};
  });
  const entradasSem=SEMS.map(s=>abertos.filter(r=>r.dt&&r.dt>=s.ini&&r.dt<=s.fim).reduce((t,r)=>t+r.valor,0));

  const iPHdr=rows.findIndex(r=>r.some(c=>String(c||'').trim()==='Descrição'));
  const pagRows=[];
  if(iPHdr>=0) {
    for(let i=iPHdr+1;i<rows.length;i++) {
      const r=rows[i];
      const desc=String(r[1]||'').trim();
      if(!desc||desc.toUpperCase().includes('TOTAL')) break;
      const cat=String(r[2]||'').trim(),val=toNum(r[3]),dt=toDate(r[4]),st=String(r[5]||'').trim();
      if(val>0) pagRows.push({desc,cat,valor:val,dt,status:st});
    }
  }
  const pagAberto=pagRows.filter(r=>r.status==='Em aberto');
  const totalPag=pagAberto.reduce((s,r)=>s+r.valor,0);
  const catMap={};
  pagAberto.forEach(r=>{catMap[r.cat]=(catMap[r.cat]||0)+r.valor;});
  const saidasSem=SEMS.map(s=>pagAberto.filter(r=>r.dt&&r.dt>=s.ini&&r.dt<=s.fim).reduce((t,r)=>t+r.valor,0));

  const saldoProj=[]; let sal=consol;
  for(let i=0;i<6;i++){sal=sal+entradasSem[i]-saidasSem[i];saldoProj.push(sal);}
  const menorSaldo=Math.min(...saldoProj);

  const iCom=rows.findIndex(r=>r.some(c=>String(c||'').includes('PONTE COMERCIAL')));
  const contratos=iCom>=0&&rows[iCom+1]?rows[iCom+1][2]:null;
  const valorFech=iCom>=0&&rows[iCom+2]?rows[iCom+2][2]:null;
  const sinalEsp=iCom>=0&&rows[iCom+3]?rows[iCom+3][2]:null;

  return {caixa,invest,credLim,credUso,cxAnt,consol,credDisp,variacao,
    recebido,pago,resultado,totalAberto,totalVencido,pctVencido,top5,
    entradasSem,saidasSem,saldoProj,menorSaldo,totalPag,catMap,
    contratos,valorFech,sinalEsp,SEMS,pagarme,totalAdiant,adiantRows};
}

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function areaGrad(ctx2d,color,opTop=0.18,opBot=0.00){
  const g=ctx2d.createLinearGradient(0,0,0,220);
  g.addColorStop(0,rgba(color,opTop));

}

let TAB='consolidado', DATA={}, timer=null;

function setStep(i){
  const steps=['Lendo parâmetros…','Lendo VONIN…','Lendo CHOCOLAB…','Renderizando…'];
  document.getElementById('app').innerHTML=`
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Carregando dados…</div>
      <div class="loading-steps">${steps.map((s,j)=>`
        <div class="loading-step ${j<i?'done':j===i?'active':''}">${j<i?'✓':j===i?'→':'○'} ${s}</div>`).join('')}
      </div>
    </div>`;
}

async function loadData() {
  const btn=document.getElementById('btn-upd');
  const icon=document.getElementById('icon-r');
  if(btn){btn.disabled=true;icon.innerHTML='<span class="spin">↻</span>';}
  if(timer)clearTimeout(timer);
  setStep(0);
  try {
    const res=await fetch(API_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw=await res.json();
    setStep(1);
    DATA.params=parseParams(raw['⚙ Parâmetros']||[]);
    const cd=toDate(DATA.params.corte)||new Date();
    setStep(2);
    DATA.vonin=parseEmpresa(raw['🔴 VONIN']||[],cd);
    setStep(3);
    DATA.chocolab=parseEmpresa(raw['🟣 CHOCOLAB']||[],cd);
    document.getElementById('badge-corte').textContent=`corte  ${cd.toLocaleDateString('pt-BR')}`;
    document.getElementById('last-upd').textContent=`↻ ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
    render();
    timer=setTimeout(loadData,AUTO_MS);
  } catch(e) {
    document.getElementById('app').innerHTML=`
      <div class="err-box"><strong>Não foi possível carregar os dados</strong><br><br>
      ${e.message}<br><br>
      Verifique a conexão e clique em <strong>Atualizar</strong>.</div>`;
  } finally {
    if(btn){btn.disabled=false;icon.innerHTML='↻';}
  }
}

function resumo(V,C,P) {
  const gRes=V.resultado+C.resultado, gV=V.totalVencido+C.totalVencido;
  const lines=[];
  lines.push(`💰 Caixa consolidado grupo: <strong>${fmt(V.consol+C.consol)}</strong>`);
  lines.push(`${gRes>=0?'📈':'📉'} Resultado da semana: <strong class="${gRes>=0?'ng':'nr'}">${sign(gRes)}${fmt(gRes)}</strong>`);
  if(V.menorSaldo<P.minV) lines.push(`⚠️ VONIN: menor saldo proj. <strong class="nr">${fmt(V.menorSaldo)}</strong> — abaixo do mínimo de ${fmt(P.minV)}`);
  else lines.push(`✅ VONIN: saldo projetado acima do mínimo em todos os períodos`);
  if(C.menorSaldo<P.minC) lines.push(`⚠️ CHOCOLAB: menor saldo proj. <strong class="nr">${fmt(C.menorSaldo)}</strong> — abaixo do mínimo de ${fmt(P.minC)}`);
  else lines.push(`✅ CHOCOLAB: saldo projetado acima do mínimo em todos os períodos`);
  if(gV>0) lines.push(`🔴 A receber vencido grupo: <strong class="nr">${fmt(gV)}</strong>`);
  if(V.top5.length) lines.push(`📋 Principal devedor VONIN: <strong>${V.top5[0].cliente.split(' - ').slice(-1)[0]}</strong> (${fmt(V.top5[0].vencido)})`);
  return lines;
}

  setTimeout(()=>{
    // VONIN vermelho · CHOCOLAB dourado/cacau
    const VR=C_V, CR=C_CHO, GR=C_GRN, DR=C_AMB;

    // Intensidade por valor (mais escuro = maior)
    const heat=(v,base,mn,mx)=>{
      const t=mx>mn?(v-mn)/(mx-mn):0.5;
      return rgba(base,0.25+t*0.65);
    };

    const maxV=Math.max(...V.saidasSem,1), maxC=Math.max(...C.saidasSem,1);
    const maxEV=Math.max(...V.entradasSem,1), maxEC=Math.max(...C.entradasSem,1);

    // ── CONSOLIDADO ───────────────────────────────────────

    // Saldo projetado — linhas finas, sem marcadores excessivos

      {label:'VONIN',    data:V.saldoProj, borderColor:VR, fill:false},
      {label:'CHOCOLAB', data:C.saldoProj, borderColor:CR, fill:false, borderDash:[4,3]},
    ]);

    // Entradas vs saídas grupo — barras empilhadas por empresa
    barChart('c-flow-g', SL, [
      {label:'Entradas VONIN',    data:V.entradasSem, backgroundColor:rgba(GR,0.7)},
      {label:'Entradas CHOCOLAB', data:C.entradasSem, backgroundColor:rgba(GR,0.4)},
      {label:'Saídas VONIN',      data:V.saidasSem.map(v=>-v), backgroundColor:rgba(VR,0.7)},
      {label:'Saídas CHOCOLAB',   data:C.saidasSem.map(v=>-v), backgroundColor:rgba(CR,0.5)},
    ]);

    // Entradas por empresa por semana
    barChart('c-recv-g', SL, [
      {label:'VONIN',    data:V.entradasSem, backgroundColor:rgba(VR,0.75)},
      {label:'CHOCOLAB', data:C.entradasSem, backgroundColor:rgba(CR,0.75)},
    ]);

    // Donut vencido vs a vencer
    donutChart('c-venc-g',
      ['VONIN — a vencer','VONIN — vencido','CHOCOLAB — a vencer','CHOCOLAB — vencido'],
      [V.totalAberto-V.totalVencido, V.totalVencido, C.totalAberto-C.totalVencido, C.totalVencido],
      [rgba(VR,0.3), VR, rgba(CR,0.3), CR]
    );

    // ── VONIN ─────────────────────────────────────────────

    // Saldo projetado VONIN — linha com área
    lineChart('c-proj-v', SL, [
      {label:'Saldo projetado', data:V.saldoProj, borderColor:VR, fill:true}
    ]);

    // Entradas vs saídas VONIN — barras divergentes
    barChart('c-flow-v', SL, [
      {label:'Entradas', data:V.entradasSem, backgroundColor:rgba(GR,0.72)},
      {label:'Saídas',   data:V.saidasSem.map(v=>-v), backgroundColor:rgba(VR,0.72)},
    ]);

    // Entradas VONIN por semana — intensidade crescente
    barChart('c-recv-v', SL, [{
      label:'Entradas',
      data:V.entradasSem,
      backgroundColor:V.entradasSem.map(v=>heat(v,GR,0,maxEV)),
    }]);

    // A Pagar VONIN — donut categorias
    const catV=Object.entries(V.catMap).sort((a,b)=>b[1]-a[1]).slice(0,7);
    donutChart('c-pag-v', catV.map(([k])=>k), catV.map(([,v])=>v), CAT_PAL.slice(0,catV.length));

    // Saídas VONIN — intensidade pelo valor
    barChart('c-sai-v', SL, [{
      label:'Saídas',
      data:V.saidasSem,
      backgroundColor:V.saidasSem.map(v=>heat(v,VR,0,maxV)),
    }]);

    // ── CHOCOLAB ──────────────────────────────────────────

    lineChart('c-proj-c', SL, [
      {label:'Saldo projetado', data:C.saldoProj, borderColor:CR, fill:true}
    ]);

    barChart('c-flow-c', SL, [
      {label:'Entradas', data:C.entradasSem, backgroundColor:rgba(GR,0.72)},
      {label:'Saídas',   data:C.saidasSem.map(v=>-v), backgroundColor:rgba(CR,0.72)},
    ]);

    barChart('c-recv-c', SL, [{
      label:'Entradas',
      data:C.entradasSem,
      backgroundColor:C.entradasSem.map(v=>heat(v,GR,0,maxEC)),
    }]);

    const catC=Object.entries(C.catMap).sort((a,b)=>b[1]-a[1]).slice(0,7);
    donutChart('c-pag-c', catC.map(([k])=>k), catC.map(([,v])=>v), CAT_PAL.slice(0,catC.length));

    barChart('c-sai-c', SL, [{
      label:'Saídas',
      data:C.saidasSem,
      backgroundColor:C.saidasSem.map(v=>heat(v,CR,0,maxC)),
    }]);

  }, 150);
}

function switchTab(id,el){
  TAB=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  const t=document.getElementById('view-'+id);
  if(t)t.classList.add('on');
}

initAuth();
</script>
